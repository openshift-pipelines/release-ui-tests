apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: simple-task
  resourceVersion: "{{metadata.resourceVersion}}"
  uid: "{{metadata.uid}}"
  labels:
    app.kubernetes.io/name: simple-task
    app.kubernetes.io/version: "1.1.0"
    app.kubernetes.io/component: build
    app.kubernetes.io/part-of: ci-pipeline
    app.kubernetes.io/managed-by: tekton
    team: openshift-pipelines
    environment: staging
    release: stable
  annotations:
    tekton.dev/description: "Build, test, and validate application artifacts with security scanning"
    tekton.dev/pipelines.minVersion: "0.50.0"
    tekton.dev/tags: "build,test,security,ci"
    owner: platform-team@example.com
    documentation: "https://docs.example.com/tasks/simple-task"
    last-modified-by: "automation-bot@example.com"
    changelog: "Added security scanning step, updated to v1.1.0"
spec:
  params:
    - name: image-name
      type: string
      description: Container image name
      default: "app"
    - name: image-tag
      type: string
      description: Container image tag
      default: "latest"
  steps:
    - name: build
      image: registry.redhat.io/ubi9/ubi-minimal
      script: |
        #!/bin/bash
        echo "Building application: $(params.image-name):$(params.image-tag)"
        echo "Build completed successfully"
    - name: test
      image: registry.redhat.io/ubi9/ubi-minimal
      script: |
        #!/bin/bash
        echo "Running unit tests..."
        echo "All tests passed"
    - name: security-scan
      image: registry.redhat.io/ubi9/ubi-minimal
      script: |
        #!/bin/bash
        echo "Running security scan..."
        echo "No vulnerabilities found"
