apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: task-for-create
spec:
  params:
    - name: message
      type: string
      default: "Hello from created task"
  steps:
    - name: echo-message
      image: registry.redhat.io/ubi9/ubi-minimal
      script: |
        #!/bin/bash
        echo "$(params.message)"
