apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: simple-pipeline
  resourceVersion: "{{metadata.resourceVersion}}"
  uid: "{{metadata.uid}}"
  labels:
    version: v2
spec:
  tasks:
    - name: greet
      taskSpec:
        steps:
          - name: say-hello
            image: registry.redhat.io/ubi9/ubi-minimal
            script: |
              #!/bin/bash
              echo "Hello from updated pipeline!"
