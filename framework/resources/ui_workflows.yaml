# ====================
# WORKFLOW PATTERNS
# ====================

patterns:
  create_resource_yaml:
    description: "Pattern for creating any Tekton resource via YAML"
    steps:
      - "Navigate to resource list page"
      - "Click Create button"
      - "Fill YAML editor with resource definition"
      - "Click Create/Save button"
      - "Wait for redirect to details page"
      - "Verify resource name matches YAML metadata.name"

  edit_resource_yaml:
    description: "Pattern for editing any Tekton resource YAML"
    steps:
      - "Navigate to resource list page or details page"
      - "Click kebab menu or Edit button"
      - "Select 'Edit [Resource]' option"
      - "Modify YAML in editor"
      - "Click Save button"
      - "Verify changes applied"

  delete_resource:
    description: "Pattern for deleting any Tekton resource"
    steps:
      - "Navigate to resource list page"
      - "Click kebab menu on resource row"
      - "Select 'Delete [Resource]' option"
      - "Confirm deletion in modal"
      - "Verify resource removed from list"

  verify_resource_in_list:
    description: "Pattern for verifying resource appears in list"
    steps:
      - "Navigate to resource list page"
      - "Search or filter for resource name"
      - "Verify row with resource name is visible"

  modal_action:
    description: "Pattern for modal-based actions (labels, annotations, etc.)"
    steps:
      - "Trigger modal (kebab menu option or button)"
      - "Wait for modal to appear"
      - "Fill form fields"
      - "Click Save/Submit"
      - "Wait for modal to close"
      - "Verify action completed"

# ====================
# METADATA
# ====================

metadata:
  generated_from: "User-provided workflow URLs"
  generated_date: "2026-04-14"
  total_workflows: 50+
  resources_covered:
    - "Tasks"
    - "TaskRuns"
    - "Pipelines"
    - "PipelineRuns"
    - "EventListeners"
    - "TriggerTemplates"
    - "TriggerBindings"
    - "ClusterTriggerBindings"
  notes:
    - "Modal interactions require special handling (wait for modal to appear/disappear)"
    - "Context menu options vary by resource type"
    - "Some workflows have conditional steps (e.g., parameters for pipelines)"
    - "URLs use {namespace} and {resource_name} as placeholders"
