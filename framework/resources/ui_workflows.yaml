# UI Workflows Database
# Maps user intents to UI navigation sequences with page objects and actions
# Generated from workflow URLs provided by user

version: "1.0.0"
base_url: "https://console-openshift-console.apps.aws-421-arm-5node-rn7c7.aws.ospqa.com"

# ====================
# TASK WORKFLOWS
# ====================

tasks:
  list:
    url: "/tasks/ns/{namespace}"
    page_object: "tasks.list"
    description: "Tasks list page showing all tasks in namespace"

  create_yaml:
    name: "Create Task via YAML"
    intent_keywords: ["create task", "new task", "task from yaml"]
    steps:
      - page: "tasks.list"
        url: "/tasks/ns/{namespace}"
        actions:
          - action: "click_create_button"
            method: "click_create_button"
            locator: "CREATE_BUTTON"

      - page: "tasks.create"
        url: "/k8s/ns/{namespace}/tekton.dev~v1~Task/~new"
        actions:
          - action: "fill_yaml_editor"
            method: "fill_yaml_editor"
            locator: "YAML_EDITOR"
            params: ["yaml_content"]

          - action: "click_create"
            method: "click_create"
            locator: "CREATE_BUTTON"

      - page: "tasks.task.details"
        url: "/k8s/ns/{namespace}/tekton.dev~v1~Task/{task_name}"
        verification:
          - method: "get_task_name"
            locator: "TASK_NAME_HEADING"
            expected: "matches_yaml_metadata_name"

  view_details:
    name: "View Task Details"
    intent_keywords: ["view task", "task details", "open task"]
    url: "/k8s/ns/{namespace}/tekton.dev~v1~Task/{task_name}"
    page_object: "tasks.task.details"

  view_yaml:
    name: "View Task YAML"
    intent_keywords: ["view task yaml", "task yaml", "see task definition"]
    url: "/k8s/ns/{namespace}/tekton.dev~v1~Task/{task_name}/yaml"
    page_object: "tasks.task.yaml"

  edit_yaml:
    name: "Edit Task YAML"
    intent_keywords: ["edit task", "modify task", "update task yaml"]
    steps:
      - page: "tasks.list"
        url: "/tasks/ns/{namespace}"
        actions:
          - action: "click_task_kebab_menu"
            method: "click_task_row_kebab"
            params: ["task_name"]

          - action: "select_edit_task"
            method: "click_kebab_option"
            params: ["Edit Task"]

      - page: "tasks.task.yaml"
        url: "/k8s/ns/{namespace}/tekton.dev~v1~Task/{task_name}/yaml"
        actions:
          - action: "modify_yaml"
            method: "fill_yaml_editor"
            params: ["updated_yaml_content"]

          - action: "save_changes"
            method: "click_save"

  edit_labels:
    name: "Edit Task Labels"
    intent_keywords: ["edit task labels", "add label to task", "modify task labels"]
    modal: true
    trigger:
      page: "tasks.list"
      action: "context_menu"
      option: "Edit labels"
    fields:
      - "labels_key_value_pairs"

  edit_annotations:
    name: "Edit Task Annotations"
    intent_keywords: ["edit task annotations", "add annotation to task"]
    modal: true
    trigger:
      page: "tasks.list"
      action: "context_menu"
      option: "Edit annotations"

  delete:
    name: "Delete Task"
    intent_keywords: ["delete task", "remove task"]
    modal: true
    trigger:
      page: "tasks.list"
      action: "context_menu"
      option: "Delete Task"
    confirmation: true

  verify_in_list:
    name: "Verify Task in List"
    intent_keywords: ["task appears", "task visible", "task in list"]
    page: "tasks.list"
    url: "/tasks/ns/{namespace}"
    verification:
      - method: "verify_task_in_list"
        params: ["task_name"]
        locator: "TASK_ROW_BY_NAME"

