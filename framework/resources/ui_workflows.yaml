# ====================
# PIPELINE WORKFLOWS
# ====================

pipelines:
  list:
    url: "/pipelines/ns/{namespace}"
    page_object: "pipelines.list"

  create_yaml:
    name: "Create Pipeline via YAML"
    intent_keywords: ["create pipeline", "new pipeline", "pipeline from yaml"]
    steps:
      - page: "pipelines.list"
        url: "/pipelines/ns/{namespace}"
        actions:
          - action: "click_create_button"
            method: "click_create_button"

      - page: "pipelines.pipeline.create"
        url: "/k8s/ns/{namespace}/tekton.dev~v1~Pipeline/~new/builder"
        note: "Can switch between builder and YAML view"
        actions:
          - action: "switch_to_yaml_view"
            method: "click_yaml_view_tab"
            optional: true

          - action: "fill_yaml_editor"
            method: "fill_yaml_editor"
            params: ["yaml_content"]

          - action: "click_create"
            method: "click_create"

      - page: "pipelines.pipeline.details"
        url: "/k8s/ns/{namespace}/tekton.dev~v1~Pipeline/{pipeline_name}"
        verification:
          - method: "get_pipeline_name"
            expected: "matches_yaml_metadata_name"

  create_builder:
    name: "Create Pipeline via Builder"
    intent_keywords: ["create pipeline visually", "pipeline builder", "build pipeline"]
    url: "/k8s/ns/{namespace}/tekton.dev~v1~Pipeline/~new/builder"
    page_object: "pipelines.pipeline.builder"
    note: "Visual pipeline builder - complex workflow"

  view_details:
    url: "/k8s/ns/{namespace}/tekton.dev~v1~Pipeline/{pipeline_name}"
    page_object: "pipelines.pipeline.details"

  view_yaml:
    url: "/k8s/ns/{namespace}/tekton.dev~v1~Pipeline/{pipeline_name}/yaml"
    page_object: "pipelines.pipeline.yaml"

  view_parameters:
    url: "/k8s/ns/{namespace}/tekton.dev~v1~Pipeline/{pipeline_name}/parameters"
    page_object: "pipelines.pipeline.parameters"

  view_pipelineruns:
    name: "View Pipeline Runs"
    intent_keywords: ["pipeline runs", "view runs", "run history"]
    url: "/k8s/ns/{namespace}/tekton.dev~v1~Pipeline/{pipeline_name}/Runs?rowFilter-pipeline-data-source=cluster-data"
    page_object: "pipelines.pipeline.runs"

  start:
    name: "Start Pipeline (No Parameters)"
    intent_keywords: ["start pipeline", "run pipeline", "trigger pipeline"]
    modal: true
    trigger:
      page: "pipelines.list"
      action: "context_menu"
      option: "Start"
    redirect_to: "pipelines.pipelinerun.details"
    note: "If pipeline has parameters, modal prompts for values"

  start_with_params:
    name: "Start Pipeline (With Parameters)"
    intent_keywords: ["start pipeline with params", "run pipeline with parameters"]
    modal: true
    trigger:
      page: "pipelines.list"
      action: "context_menu"
      option: "Start"
    fields:
      - "parameter_values"
    submit_action: "click_start"
    redirect_to: "pipelines.pipelinerun.details"

  start_last_run:
    name: "Start Last Run"
    intent_keywords: ["rerun pipeline", "start last run", "repeat last pipeline run"]
    modal: true
    trigger:
      page: "pipelines.list"
      action: "context_menu"
      option: "Start last run"
    note: "Uses parameters from previous PipelineRun"
    redirect_to: "pipelines.pipelinerun.details"

  edit_labels:
    name: "Edit Pipeline Labels"
    modal: true
    trigger:
      page: "pipelines.list"
      action: "context_menu"
      option: "Edit labels"

  edit_annotations:
    name: "Edit Pipeline Annotations"
    modal: true
    trigger:
      page: "pipelines.list"
      action: "context_menu"
      option: "Edit annotations"

  edit_yaml:
    name: "Edit Pipeline"
    intent_keywords: ["edit pipeline", "modify pipeline"]
    trigger:
      page: "pipelines.list"
      action: "context_menu"
      option: "Edit Pipeline"
    redirect_to: "pipelines.pipeline.yaml"

  delete:
    name: "Delete Pipeline"
    intent_keywords: ["delete pipeline", "remove pipeline"]
    modal: true
    trigger:
      page: "pipelines.list"
      action: "context_menu"
      option: "Delete Pipeline"
    confirmation: true

